<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>s7abow Upload</title>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    background:#1e293b;
    padding:25px;
    border-radius:20px;
    width:360px;
    text-align:center;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:10px 15px;
    margin-top:10px;
    border-radius:10px;
    cursor:pointer;
}

a{
    color:#38bdf8;
    word-break:break-all;
}

.preview{
    width:100%;
    margin-top:10px;
    border-radius:10px;
}

textarea{
    width:100%;
    height:80px;
    margin-top:10px;
    border-radius:10px;
    padding:10px;
    background:#0f172a;
    color:white;
    border:none;
}

</style>
</head>

<body>

<div class="box">

<h2>s7abow upload</h2>

<input type="file" id="file">

<br>

<button onclick="uploadFile()">
Upload
</button>

<div id="preview"></div>
<div id="result"></div>

</div>

<script>

async function uploadFile(){

    const file =
        document.getElementById('file').files[0]

    if(!file){
        alert("Choose file")
        return
    }

    const form = new FormData()
    form.append('file', file)

    const res = await fetch('/api/upload', {
        method:'POST',
        body:form
    })

    const data = await res.json()

    if(!data.status){
        alert("Error")
        return
    }

    let preview = ""

    if(file.type.startsWith('image/')){
        preview = `<img class="preview" src="${data.url}">`
    }

    else if(file.type.startsWith('video/')){
        preview = `
        <video class="preview" controls>
            <source src="${data.url}">
        </video>`
    }

    const apiExample =
`fetch('${window.location.origin}/api/upload',{
  method:'POST',
  body:formData
})`

    document.getElementById('preview').innerHTML = preview

    document.getElementById('result').innerHTML = `

        <p>File URL:</p>

        <a href="${data.url}" target="_blank">${data.url}</a>

        <br>

        <button onclick="copyText('${data.url}')">
            Copy Link
        </button>

        <h3>API</h3>

        <textarea id="apiBox">${apiExample}</textarea>

        <button onclick="copyText(document.getElementById('apiBox').value)">
            Copy API
        </button>

    `
}

// دالة النسخ
function copyText(text){
    navigator.clipboard.writeText(text)
    alert("Copied")
}

</script>

</body>
</html>
